name: Linux

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rust
        run: cargo build --release

      - name: Build C reference
        run: cd c && ./configure && make

      - name: Test Rust
        run: ./tests/testsuite-inline.sh ./target/release/lich

      - name: Test C/Rust parity
        run: ./tests/testsuite-parity.sh ./c/lich ./target/release/lich
