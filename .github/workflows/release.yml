name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          ./configure
          make
          strip abduco
          mv abduco abduco-linux-x86_64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: abduco-linux-x86_64
          generate_release_notes: true

  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          ./configure
          make
          strip abduco
          mv abduco abduco-macos-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: abduco-macos-arm64
          generate_release_notes: true
